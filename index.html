<!DOCTYPE html>
<html lang="UTF-8">
<head>
    <meta charset="UTF-8">
    <title>Game Catalog</title>
    <link rel="stylesheet" href="game_styles.css">
</head>
<body>
    <header class="main-header">
        <nav class="main-nav">
            <ul class="nav-list">
                <li class="nav-item active" data-section="games">
                    <span>🎮 Игры</span>
                </li>
                <li class="nav-item" data-section="movies">
                    <span>🎬 Кино</span>
                </li>
                <li class="nav-item" data-section="series">
                    <span>📺 Сериалы</span>
                </li>
                <li class="nav-item" data-section="anime">
                    <span>🌸 Аниме</span>
                </li>
                <li class="nav-item" data-section="books">
                    <span>📚 Книги</span>
                </li>
            </ul>
        </nav>
        <button id="toggleAddFormBtn" class="add-button">+ Добавить</button>
    </header>
    <div id="contentSection" class="content-section">

    </div>
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <p id="modalMessage"></p>
            <button class="modal-button" id="modalClose">OK</button>
        </div>
    </div>
    <script>
        // Глобальные переменные
        const errorModal = document.getElementById('errorModal');
        const modalMessage = document.getElementById('modalMessage');
        const modalClose = document.getElementById('modalClose');

        // Функция закрытия меню
        function showError(message) {
            modalMessage.textContent = message;
            errorModal.style.display = 'block';
            return new Promise(resolve => {
                modalClose.onclick = () => {
                    errorModal.style.display = 'none';
                    resolve();
                };
            });
        }

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            await loadRatings();
            await loadStatuses();

            // Загружаем игры по умолчанию
            const games = await window.electronAPI.getGamesWithTags();
            await renderSection('games', games);

            setupEventListeners();
        });

        // Загрузка рейтингов
        async function loadRatings() {
            try {
                const ratings = await window.electronAPI.getGameRatings();
                const ratingSelect = document.getElementById('ratingSelect');
                if (ratingSelect) {
                    ratingSelect.innerHTML = `
            <option value="0">Рейтинг</option>
            ${ratings.map(r => `<option value="${r}">${r}</option>`).join('')}
            `;
                }
            } catch (error) {
                console.error('Error loading ratings:', error);
                await showError('Failed to load ratings');
            }
        }

        async function loadStatuses() {
            try {
                const statuses = await window.electronAPI.getGameStatuses();
                const statusSelect = document.getElementById('statusSelect');
                if (statusSelect) {
                    statusSelect.innerHTML = `
            ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
            `;
                }
            } catch (error) {
                console.error('Error loading statuses:', error);
            }
        }

        // Загрузка списка игр
        async function loadGames() {
            try {
                const games = await window.electronAPI.getGamesWithTags();
                renderGames(games);
            } catch (error) {
                console.error('Error loading games:', error);
                await showError('Failed to load games');
            }
        }
        // Отрисовка игр
        function renderGames(games) {
            const contentSection = document.getElementById('contentSection');

            // Очищаем секцию и добавляем заголовок и контейнер для игр
            contentSection.innerHTML = `
                <h1 class="section-title">🎮 Игры</h1>
                <div id="gamesList" class="games-grid">
                    ${games.map(game => `
                        <div class="game-card" data-game-name="${game.gameName}">
                            <button class="delete-btn" data-game="${game.gameName}">🗑️</button>
                            ${getGameIconHTML(game)}
                            <div class="game-info">
                                <h3 class="game-title">${game.gameName}</h3>
                                <div class="game-ratings-container">
                                    <span class="game-rating rating-value editable-field"
                                          data-rating="${game.gameRating}"
                                          data-game="${game.gameName}"
                                          title="Редактировать">
                                        ${game.gameRating || 'Не оценено'}
                                    </span>
                                    <span class="game-status status-value editable-field"
                                          data-status="${game.gameStatus}"
                                          data-game="${game.gameName}"
                                          title="Редактировать">
                                        ${game.gameStatus || 'Не играл'}
                                    </span>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
            setupDeleteButtons();
            setupEditableFields();
        }

        function setupDeleteButtons() {
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.stopPropagation(); // Предотвращаем всплытие события
                    const gameName = btn.dataset.game;

                    try {
                        await window.electronAPI.deleteGame(gameName);
                        btn.closest('.game-card').remove(); // Перезагружаем список игр после удаления
                    } catch (error) {
                        console.error('Не удалось удалить игру:', error);
                        await showError('Не удалось удалить игру');
                    }
                });
            });
        }

        function setupEditableFields() {
            document.querySelectorAll('.editable-field').forEach(field => {
                // Меняем курсор при наведении
                field.style.cursor = 'pointer';

                // Обработчик клика
                field.addEventListener('click', async function(e) {
                    e.stopPropagation();
                    const gameName = this.dataset.game;
                    const isRating = this.classList.contains('rating-value');
                    const currentValue = isRating ? this.dataset.rating : this.dataset.status;

                    // Получаем возможные значения
                    let values, title;
                    if (isRating) {
                        values = await window.electronAPI.getGameRatings();
                        title = 'Выберите рейтинг';
                    } else {
                        values = await window.electronAPI.getGameStatuses();
                        title = 'Выберите статус';
                    }

                    // Создаем модальное окно с селектором
                    const modal = document.createElement('div');
                    modal.className = 'modal';
                    modal.style.display = 'block';
                    modal.innerHTML = `
                    <div class="modal-content" style="max-width: 300px;">
                        <h3>${title}</h3>
                        <select class="edit-select">
                            ${values.map(v => `<option value="${v}" ${v === currentValue ? 'selected' : ''}>${v}</option>`).join('')}
                        </select>
                        <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                            <button class="modal-button cancel-btn">Отмена</button>
                            <button class="modal-button confirm-btn">Сохранить</button>
                        </div>
                    </div>
                `;

                    document.body.appendChild(modal);

                    // Обработчики для кнопок
                    modal.querySelector('.cancel-btn').addEventListener('click', () => {
                        document.body.removeChild(modal);
                    });

                    modal.querySelector('.confirm-btn').addEventListener('click', async () => {
                        const newValue = modal.querySelector('.edit-select').value;
                        try {
                            if (isRating) {
                                await window.electronAPI.updateGameRating(gameName, newValue);
                                this.dataset.rating = newValue;
                                this.textContent = newValue || 'Не оценено';
                            } else {
                                await window.electronAPI.updateGameStatus(gameName, newValue);
                                this.dataset.status = newValue;
                                this.textContent = newValue || 'Не играл';
                            }
                            document.body.removeChild(modal);
                        } catch (error) {
                            console.error('Ошибка при обновлении:', error);
                            showError('Не удалось обновить значение');
                        }
                    });

                    // Закрытие при клике вне модального окна
                    modal.addEventListener('click', (e) => {
                        if (e.target === modal) {
                            document.body.removeChild(modal);
                        }
                    });
                });
            });
        }

        // Генерация HTML для иконки игры
        function getGameIconHTML(game) {
            let iconUrl = 'https://apptor.studio/assets/cache/images/600-856x600-629.png';

            // Проверяем URL обложки
            if (game.icoUrl) {
                try {
                    new URL(game.icoUrl); // Проверяем, что это валидный URL
                    iconUrl = game.icoUrl;
                } catch (e) {
                    // Если URL невалидный, используем заглушку
                    iconUrl = 'https://apptor.studio/assets/cache/images/600-856x600-629.png';
                }
            }

            return `
            <img src="${iconUrl}"
                 alt="${game.gameName}"
                 class="game-icon"
                 onerror="this.src='https://apptor.studio/assets/cache/images/600-856x600-629.png'">
            `;
        }

        // Добавление новой игры
        async function addNewGame() {
            const nameInput = document.getElementById('nameInput');
            const icoInput = document.getElementById('icoInput');
            const videoInput = document.getElementById('videoInput');
            const ratingSelect = document.getElementById('ratingSelect');
            const statusSelect = document.getElementById('statusSelect');

            const gameData = {
                name: nameInput.value.trim(),
                icoUrl: icoInput.value.trim(),
                videoUrl: videoInput.value.trim(),
                rating: ratingSelect.value,
                status: statusSelect.value
            };

            if (!gameData.name) {
                await showError('Пожалуйста, введите название игры');
                nameInput.focus();
                return;
            }

            if (!gameData.rating) {
                await showError('Пожалуйста, выберите рейтинг');
                ratingSelect.focus();
                return;
            }

            try {
                await window.electronAPI.addGame(gameData);
                resetForm();
                const games = await window.electronAPI.getGamesWithTags();
                await renderSection('games', games);
            } catch (error) {
                console.error('Ошибка при добавлении игры:', error);
                await showError(`Ошибка при добавлении игры: ${error.message}`);
            }
        }

        // Сброс формы
        function resetForm() {
            const nameInput = document.getElementById('nameInput');
            const icoInput = document.getElementById('icoInput');
            const videoInput = document.getElementById('videoInput');
            const ratingSelect = document.getElementById('ratingSelect');
            const statusSelect = document.getElementById('statusSelect');
            const toggleBtn = document.getElementById('toggleAddFormBtn');
            const addForm = document.getElementById('addGameForm');

            if (nameInput) nameInput.value = '';
            if (icoInput) icoInput.value = '';
            if (videoInput) videoInput.value = '';
            if (ratingSelect) ratingSelect.value = '0';
            if (statusSelect) statusSelect.value = 'Не играл';

            if (toggleBtn && addForm) {
                if (addForm.classList.contains('visible')) {
                    addForm.classList.toggle('visible');
                    toggleBtn.textContent = '+ Добавить';
                }
            }
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            const addBtn = document.getElementById('addBtn');
            if (addBtn) {
                addBtn.addEventListener('click', addNewGame);
            }
        }

        // Навигация между разделами
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', async function() {
                // Удаляем активный класс у всех элементов
                document.querySelectorAll('.nav-item').forEach(navItem => {
                    navItem.classList.remove('active');
                });

                // Добавляем активный класс текущему элементу
                this.classList.add('active');

                // Получаем выбранный раздел
                const section = this.dataset.section;

                try {
                    switch(section) {
                        case 'games':
                            const games = await window.electronAPI.getGamesWithTags();
                            await renderSection('games', games);
                            break;
                        case 'movies':
                            // const movies = await window.electronAPI.getMovies();
                            // await renderSection('movies', movies);
                            break;
                        // Остальные разделы
                    }
                } catch (error) {
                    console.error(`Ошибка загрузки раздела ${section}:`, error);
                    await showError(`Не удалось загрузить раздел ${section}`);
                }
            });
        });

        async function renderSection(section, data) {
            const contentSection = document.getElementById('contentSection');
            let title = '';
            let content = '';

            switch(section) {
                case 'games':
                    title = '🎮 Игры';
                    content = `
                        <div id="addGameForm" class="add-game-form">
                            <div class="form-group">
                                <label for="nameInput">Название игры</label>
                                <input id="nameInput" placeholder="Введите название игры">
                            </div>

                            <div class="form-group">
                                <label for="icoInput">Обложка игры</label>
                                <input id="icoInput" placeholder="https://example.com/icon.jpg">
                            </div>

                            <div class="form-group">
                                <label for="videoInput">Трейлер игры</label>
                                <input id="videoInput" placeholder="https://youtu.be/example">
                            </div>

                            <div class="form-group">
                                <label for="ratingSelect">Рейтинг</label>
                                <select id="ratingSelect">
                                    <option value="0">Рейтинг</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="statusSelect">Статус</label>
                                <select id="statusSelect">
                                    <option value="Не играл">Не играл</option>
                                </select>
                            </div>

                            <button id="addBtn">Add Game</button>
                        </div>
                        <div id="gamesList" class="games-grid">
                            ${data.map(game => `
                                <div class="game-card" data-game-name="${game.gameName}">
                                    <button class="delete-btn" data-game="${game.gameName}">🗑️</button>
                                    ${getGameIconHTML(game)}
                                    <div class="game-info">
                                        <h3 class="game-title">${game.gameName}</h3>
                                        <div class="game-ratings-container">
                                            <span class="game-rating rating-value editable-field"
                                                  data-rating="${game.gameRating}"
                                                  data-game="${game.gameName}"
                                                  title="Редактировать">
                                                ${game.gameRating || 'Не оценено'}
                                            </span>
                                            <span class="game-status status-value editable-field"
                                                  data-status="${game.gameStatus}"
                                                  data-game="${game.gameName}"
                                                  title="Редактировать">
                                                ${game.gameStatus || 'Не играл'}
                                            </span>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                    break;
                // ... остальные разделы
            }

            contentSection.innerHTML = `
                <h1 class="section-title">${title}</h1>
                ${content}
            `;

            if (section === 'games') {
                await loadRatings();
                await loadStatuses();
                setupDeleteButtons();
                setupEditableFields();
                setupEventListeners();
                setupAddFormToggle(); // Добавляем обработчик для кнопки добавления
            }
        }
        function setupAddFormToggle() {
            const toggleBtn = document.getElementById('toggleAddFormBtn');
            const addForm = document.getElementById('addGameForm');

            if (toggleBtn && addForm) {
                toggleBtn.addEventListener('click', () => {
                    addForm.classList.toggle('visible');
                    if (addForm.classList.contains('visible')) {
                        toggleBtn.textContent = '− Скрыть';
                    } else {
                        toggleBtn.textContent = '+ Добавить';
                    }
                });
            }
        }
    </script>
</body>
</html>
