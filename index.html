<!DOCTYPE html>
<html lang="UTF-8">
<head>
    <meta charset="UTF-8">
    <title>DECatalog</title>
    <link rel="stylesheet" href="game_styles.css">
</head>
<body>
<header class="main-header">
    <nav class="main-nav">
        <ul class="nav-list">
            <li class="nav-item active" data-section="games">
                <span>🎮 Игры</span>
            </li>
            <li class="nav-item" data-section="movies">
                <span>🎬 Кино</span>
            </li>
            <li class="nav-item" data-section="serials">
                <span>📺 Сериалы</span>
            </li>
            <li class="nav-item" data-section="anime">
                <span>🌸 Аниме</span>
            </li>
            <li class="nav-item" data-section="books">
                <span>📚 Книги</span>
            </li>
        </ul>
    </nav>
    <div class="header-buttons">
        <button id="importBtn" class="header-button" title="Импорт данных">📥 Импорт</button>
        <button id="exportBtn" class="header-button" title="Экспорт данных">📤 Экспорт</button>
        <button id="toggleAddFormBtn" class="add-button">+ Добавить</button>
        <button id="donateBtn" class="header-button" title="Поддержать разработчика">❤️ Поддержать</button>
    </div>
</header>
<div id="contentSection" class="content-section">

</div>
<div id="errorModal" class="modal">
    <div class="modal-content">
        <p id="modalMessage"></p>
        <button class="modal-button" id="modalClose">OK</button>
    </div>
</div>
<div id="donateModal" class="modal donate-modal">
    <div class="modal-content" style="max-width: 500px;">
        <h3>Поддержать разработчика</h3>
        <p>Если вам нравится приложение, вы можете поддержать его развитие:</p>

        <div class="donate-methods">
            <div class="donate-method">
                <h2>Ссылка для доната</h2>
                <p>www.tbank.ru/rm/r_LoCtXRkiVO.vLkPckLzyM/cNGSO52096</p>
                <button class="copy-btn" data-text="https://www.tinkoff.ru/rm/r_LoCtXRkiVO.vLkPckLzyM/cNGSO52096">Копировать</button>
            </div>
            <div class="qr-code-container">
                <h2>Или отсканируйте QR-код</h2>
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://www.tinkoff.ru/rm/r_LoCtXRkiVO.vLkPckLzyM/cNGSO52096"
                     alt="QR код для доната">
            </div>
        </div>

        <button class="modal-button-close" id="closeDonateModal">Закрыть</button>
    </div>
</div>
<button id="scrollToTopBtn" class="scroll-to-top" title="Наверх">↑</button>
<script>
    // Глобальные переменные
    const errorModal = document.getElementById('errorModal');
    const modalMessage = document.getElementById('modalMessage');
    const modalClose = document.getElementById('modalClose');
    let isAddingGame = false;
    const scrollToTopBtn = document.getElementById('scrollToTopBtn');

    let currentPage = 1;
    const itemsPerPage = 20; // Количество элементов на странице
    let isLoading = false;
    let allItemsLoaded = false;

    let currentFilters = {
        searchQuery: '',
        statusFilter: 'Все'
    };


    window.addEventListener('scroll', () => {
        if (window.pageYOffset > 300) {
            scrollToTopBtn.classList.add('visible');
        } else {
            scrollToTopBtn.classList.remove('visible');
        }
    });

    scrollToTopBtn.addEventListener('click', () => {
        window.scrollTo({
            top: 0,
            behavior: 'smooth'
        });
    });

    document.getElementById('exportBtn').addEventListener('click', async () => {
        try {
            const result = await window.electronAPI.exportData();
            if (result.success) {
                await showError(result.message);
            } else if (result.message !== 'Экспорт отменен') {
                await showError(result.message);
            }
        } catch (error) {
            console.error('Export error:', error);
            await showError('Ошибка при экспорте данных');
        }
    });
    document.getElementById('importBtn').addEventListener('click', async () => {
        try {
            const result = await window.electronAPI.importData();
            if (result.success) {
                await showError(result.message);
                // Перезагружаем текущий раздел
                const section = document.querySelector('.nav-item.active')?.dataset.section;
                if (section) {
                    let data;
                    switch(section) {
                        case 'games': data = await window.electronAPI.getGamesWithTags(); break;
                        case 'movies': data = await window.electronAPI.getMoviesWithTags(); break;
                        case 'serials': data = await window.electronAPI.getSerialsWithTags(); break;
                        case 'anime': data = await window.electronAPI.getAnimeWithTags(); break;
                        case 'books': data = await window.electronAPI.getBooksWithTags(); break;
                    }
                    await renderSection(section, data, true);
                }
            } else if (result.message !== 'Импорт отменен') {
                await showError(result.message);
            }
        } catch (error) {
            console.error('Import error:', error);
            await showError('Ошибка при импорте данных');
        }
    });
    document.getElementById('donateBtn')?.addEventListener('click', () => {
        document.getElementById('donateModal').style.display = 'block';
    });

    // Закрытие модального окна
    document.getElementById('closeDonateModal')?.addEventListener('click', () => {
        document.getElementById('donateModal').style.display = 'none';
    });

    document.getElementById('donateModal').addEventListener('click', function(e) {
        if (e.target === this) {
            this.style.display = 'none';
        }
    });

    // Копирование адресов
    document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const text = this.getAttribute('data-text');
            navigator.clipboard.writeText(text).then(() => {
                const originalText = this.textContent;
                this.textContent = 'Скопировано!';
                setTimeout(() => {
                    this.textContent = originalText;
                }, 2000);
            });
        });
    });

    // Функция отображения ошибок
    function showError(message) {
        modalMessage.textContent = message;
        errorModal.style.display = 'block';
        return new Promise(resolve => {
            modalClose.onclick = () => {
                errorModal.style.display = 'none';
                resolve();
            };
        });
    }

    // Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', async () => {
        await loadRatings();
        await loadStatuses();

        // Загружаем игры по умолчанию
        const games = await window.electronAPI.getGamesWithTags();
        await renderSection('games', games);
    });

    // Загрузка рейтингов
    async function loadRatings() {
        try {
            const ratings = await window.electronAPI.getRatings();
            const ratingSelect = document.getElementById('ratingSelect');
            if (ratingSelect) {
                ratingSelect.innerHTML = `
            <option value="0">Рейтинг</option>
            ${ratings.map(r => `<option value="${r}">${r}</option>`).join('')}
            `;
            }
        } catch (error) {
            console.error('Error loading ratings:', error);
            await showError('Failed to load ratings');
        }
    }
    // Загрузка статусов
    async function loadStatuses() {
        try {
            const statuses = await window.electronAPI.getStatuses();
            const statusSelect = document.getElementById('statusSelect');
            if (statusSelect) {
                statusSelect.innerHTML = `
            ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
            `;
            }
        } catch (error) {
            console.error('Error loading statuses:', error);
        }
    }

    // Генерация HTML для иконки игры
    function getCardIconHTML(game) {
        let iconUrl = 'https://apptor.studio/assets/cache/images/600-856x600-629.png';

        // Проверяем URL обложки
        if (game.icoUrl) {
            try {
                new URL(game.icoUrl); // Проверяем, что это валидный URL
                iconUrl = game.icoUrl;
            } catch (e) {
                // Если URL невалидный, используем заглушку
                iconUrl = 'https://apptor.studio/assets/cache/images/600-856x600-629.png';
            }
        }

        return `
            <img src="${iconUrl}"
                 alt="${game.name}"
                 class="game-icon"
                 onerror="this.src='https://apptor.studio/assets/cache/images/600-856x600-629.png'">
            `;
    }

    // Сброс формы
    function resetForm() {
        const nameInput = document.getElementById('nameInput');
        const icoInput = document.getElementById('icoInput');
        const ratingSelect = document.getElementById('ratingSelect');
        const statusSelect = document.getElementById('statusSelect');

        if (nameInput) nameInput.value = '';
        if (icoInput) icoInput.value = '';
        if (ratingSelect) ratingSelect.value = '0';
        if (statusSelect) statusSelect.value = 'Не играл';
    }

    async function renderSection(section, data, resetPagination = true, preserveFilters = false) {
        const contentSection = document.getElementById('contentSection');
        if (!contentSection) return;

        // Очистка перед рендером
        cleanupSection();

        if (resetPagination) {
            currentPage = 1;
            allItemsLoaded = false;
        }

        // Сохраняем все данные для фильтрации и пагинации
        window.allSectionData = data;

        // Применяем текущие фильтры, если не указано preserveFilters = false
        if (preserveFilters) {
            window.filteredData = filterData(data, currentFilters.searchQuery, currentFilters.statusFilter);
        } else {
            window.filteredData = data;
            currentFilters = { searchQuery: '', statusFilter: 'Все' }; // Сбрасываем фильтры
        }

        const oldSearchInput = document.getElementById('searchInput');
        const oldSearchBtn = document.getElementById('searchBtn');
        const oldStatusFilter = document.getElementById('statusFilter');

        if (oldSearchInput) oldSearchInput.replaceWith(oldSearchInput.cloneNode(true));
        if (oldSearchBtn) oldSearchBtn.replaceWith(oldSearchBtn.cloneNode(true));
        if (oldStatusFilter) oldStatusFilter.replaceWith(oldStatusFilter.cloneNode(true));
        // Рендерим контент
        contentSection.innerHTML = `
        <div class="section-header">
            <h1 class="section-title">${getSectionTitle(section)}</h1>
            <div style="display: flex; flex-wrap: wrap; gap: 10px;">
                <div class="filter-container">
                    <select id="statusFilter">
                        <option value="Все">Все статусы</option>
                    </select>
                </div>
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Поиск..." value="${currentFilters.searchQuery}">
                    <div id="searchSuggestions" class="search-suggestions"></div>
                    <button id="searchBtn">🔍</button>
                    <button id="clearSearchBtn" class="clear-search-btn" ${currentFilters.searchQuery ? '' : 'style="display: none;"'}>✕</button>
                </div>
            </div>
        </div>
        ${getAddFormHTML()}
        <div id="dataList" class="data-grid"></div>
        <div id="loadingIndicator" class="loading-indicator" style="display: none;">
            <div class="loading-spinner"></div>
            <p>Загрузка...</p>
        </div>
    `;

        await initCardSection();
        hideAddForm();
        setupSearchInput();

        // Устанавливаем сохранённое значение фильтра статуса
        const statusFilter = document.getElementById('statusFilter');
        if (statusFilter && currentFilters.statusFilter) {
            statusFilter.value = currentFilters.statusFilter;
        }

        loadMoreItems(); // Загружаем первую страницу

        // Добавляем обработчик прокрутки
        window.addEventListener('scroll', handleScroll);
    }

    function filterData(data, searchQuery, statusFilter) {
        const queryLower = (searchQuery || '').toLowerCase();
        return data.filter(item => {
            const nameMatches = !queryLower || item.name.toLowerCase().includes(queryLower);
            const statusMatches = statusFilter === 'Все' || item.status === statusFilter;
            return nameMatches && statusMatches;
        });
    }

    let scrollTimeout;
    function handleScroll() {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            if (isLoading || allItemsLoaded) return;
            const scrollPosition = window.innerHeight + window.scrollY;
            if (scrollPosition > document.body.offsetHeight - 500) {
                loadMoreItems();
            }
        }, 100);
    }

    function cleanupSection() {
        window.removeEventListener('scroll', handleScroll);
        const interactiveElements = [
            '#searchInput', '#searchBtn', '#statusFilter',
            '.editable-field', '.delete-btn', '.search-btn',
            '#toggleAddFormBtn', '#addForm'
        ];

        interactiveElements.forEach(selector => {
            document.querySelectorAll(selector).forEach(el => {
                el.replaceWith(el.cloneNode(true));
            });
        });
    }

    async function loadMoreItems() {
        if (isLoading || allItemsLoaded) return;

        isLoading = true;
        const loadingIndicator = document.getElementById('loadingIndicator');
        if (loadingIndicator) loadingIndicator.style.display = 'block';

        // Получаем данные для текущей страницы
        const startIndex = (currentPage - 1) * itemsPerPage;
        const endIndex = startIndex + itemsPerPage;
        const itemsToRender = window.filteredData.slice(startIndex, endIndex);

        if (itemsToRender.length === 0) {
            allItemsLoaded = true;
            isLoading = false;
            if (loadingIndicator) loadingIndicator.style.display = 'none';
            return;
        }

        // Рендерим карточки
        const dataList = document.getElementById('dataList');
        if (dataList) {
            dataList.innerHTML += renderCardList(itemsToRender);
        }

        // Обновляем состояние
        currentPage++;
        isLoading = false;
        if (loadingIndicator) loadingIndicator.style.display = 'none';

        // Инициализируем кнопки и поля для новых карточек
        setupDeleteButtons();
        setupEditableFields();
        setupTitleClickHandlers();
        setupSearchButtons();
    }

    async function loadStatusFilter() {
        try {
            const statuses = await window.electronAPI.getStatuses();
            const statusFilter = document.getElementById('statusFilter');
            if (statusFilter) {
                statusFilter.innerHTML = `
                <option value="Все">Все статусы</option>
                ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
            `;

                // Добавляем обработчик изменения фильтра
                statusFilter.addEventListener('change', () => {
                    filterCards();
                });
            }
        } catch (error) {
            console.error('Error loading statuses for filter:', error);
        }
    }

    function setupSearchInput() {
        const oldInput = document.getElementById('searchInput');
        if (oldInput) oldInput.replaceWith(oldInput.cloneNode(true));
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const searchSuggestions = document.getElementById('searchSuggestions');

        if (!searchInput || !searchBtn) return;

        function updateSuggestions(query) {
            const queryLower = query.toLowerCase();
            searchSuggestions.innerHTML = '';

            if (query.length < 2) {
                searchSuggestions.style.display = 'none';
                return;
            }

            const matches = window.allSectionData.filter(item =>
                item.name.toLowerCase().includes(queryLower)
            ).slice(0, 5);

            if (matches.length > 0) {
                searchSuggestions.innerHTML = matches.map(item => `
                <div class="suggestion-item">${item.name}</div>
            `).join('');
                searchSuggestions.style.display = 'block';
            } else {
                searchSuggestions.style.display = 'none';
            }
        }

        const clearSearchBtn = document.getElementById('clearSearchBtn');
        if (clearSearchBtn) {
            clearSearchBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearSearchBtn.style.display = 'none';
                filterCards('');
            });
        }

        // Обработчик ввода текста
        searchInput.addEventListener('input', (e) => {
            updateSuggestions(e.target.value);
            if (clearSearchBtn) {
                clearSearchBtn.style.display = e.target.value ? 'block' : 'none';
            }
        });

        // Обработчик клика по подсказке
        searchSuggestions.addEventListener('click', (e) => {
            if (e.target.classList.contains('suggestion-item')) {
                searchInput.value = e.target.textContent;
                searchSuggestions.style.display = 'none';
                filterCards(e.target.textContent);
            }
        });

        // Обработчик кнопки поиска
        searchBtn.addEventListener('click', () => {
            // Показываем подсказки при клике, если есть текст в поле поиска
            if (searchInput.value.length >= 2) {
                updateSuggestions(searchInput.value);
            }
            filterCards(searchInput.value);
        });

        // Обработчик нажатия Enter
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                filterCards(searchInput.value);
            }
        });

        // Скрытие подсказок при клике вне
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) &&
                !searchBtn.contains(e.target) &&
                !searchSuggestions.contains(e.target)) {
                searchSuggestions.style.display = 'none';
            }
        });
    }

    function filterCards(query = '') {
        const statusFilter = document.getElementById('statusFilter');
        const selectedStatus = statusFilter ? statusFilter.value : 'Все';
        const clearSearchBtn = document.getElementById('clearSearchBtn');

        // Сохраняем текущие фильтры
        currentFilters = {
            searchQuery: query,
            statusFilter: selectedStatus
        };

        if (clearSearchBtn) {
            clearSearchBtn.style.display = query ? 'block' : 'none';
        }

        window.filteredData = filterData(window.allSectionData, query, selectedStatus);

        // Сбрасываем пагинацию и перерисовываем
        const dataList = document.getElementById('dataList');
        if (dataList) dataList.innerHTML = '';
        currentPage = 1;
        allItemsLoaded = false;
        loadMoreItems();
    }

    // Вспомогательные функции
    function getSectionTitle(section) {
        const titles = {
            games: '🎮 Игры',
            movies: '🎬 Кино',
            serials: '📺 Сериалы',
            anime: '🌸 Аниме',
            books: '📚 Книги'
        };
        return titles[section] || section;
    }

    async function renderCardSection(data) {
        return `
                ${getAddFormHTML()}
                ${renderCardList(data)}
            `;
    }

    async function initCardSection() {
        await Promise.all([
            loadRatings(),
            loadStatuses(),
            loadStatusFilter()
        ]);

        setupDeleteButtons();
        setupEditableFields();
        setupTitleClickHandlers();
        setupSearchButtons();
        setupEventListeners();
        setupAddFormToggle();
        setupIconSearchButton();
    }

    function hideAddForm() {
        const addForm = document.getElementById('addForm');
        if (addForm) {
            addForm.classList.remove('visible');
        }
        const toggleBtn = document.getElementById('toggleAddFormBtn');
        if (toggleBtn) {
            toggleBtn.textContent = '+ Добавить';
        }
    }

    function getAddFormHTML() {
        return `
                <div id="addForm" class="add-form">
                    <div class="form-group">
                        <input id="nameInput" placeholder="Введите название">
                    </div>

                    <div class="form-group">
                        <div class="icon-input-container">
                            <input id="icoInput" placeholder="https://example.com/icon.jpg">
                            <button id="searchIconBtn" class="search-icon-btn" title="Найти иконку в интернете">🔍</button>
                        </div>
                    </div>

                    <div class="form-group">
                        <select id="ratingSelect">
                            <option value="0">Рейтинг</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <select id="statusSelect">
                            <option value="Уточнить">Уточнить</option>
                        </select>
                    </div>

                    <button id="addBtn">Добавить</button>
                </div>
            `;
    }

    function renderCardList(cards) {
        return cards.map(card => `
                <div class="data-card" data-name="${card.name}" style="display: block;">
                    <button class="delete-btn" data-name="${card.name}">🗑️</button>
                    <button class="search-btn" data-name="${card.name}" title="Найти в интернете">🔍</button>
                    ${getCardIconHTML(card)}
                    <div class="data-info">
                        <h3 class="data-title">${card.name}</h3>
                        <div class="data-ratings-container">
                            <span class="card-rating rating-value editable-field"
                                  data-rating="${card.rating}"
                                  data-name="${card.name}"
                                  title="Редактировать">
                                ${card.rating || '0'}
                            </span>
                            <span class="card-status status-value editable-field"
                                  data-status="${card.status}"
                                  data-name="${card.name}"
                                  title="Редактировать">
                                ${card.status || 'Уточнить'}
                            </span>
                        </div>
                    </div>
                </div>
            `).join('');
    }

    function setupAddFormToggle() {
        const toggleBtn = document.getElementById('toggleAddFormBtn');
        const addForm = document.getElementById('addForm');

        if (toggleBtn && addForm) {
            toggleBtn.onclick = () => {
                addForm.classList.toggle('visible');
                toggleBtn.textContent = addForm.classList.contains('visible') ? '− Скрыть' : '+ Добавить';
                if (addForm.classList.contains('visible')) {
                    document.getElementById('nameInput')?.focus();
                }
            };
        }
    }

    // Настройка обработчиков событий, при добавлении секций редактировать ЗДЕСЬ (Всё, что ниже)
    function setupEventListeners() {
        document.addEventListener('click', async (e) => {
            if (e.target && e.target.id === 'addBtn') {
                const section = document.querySelector('.nav-item.active')?.dataset.section;
                await addNewData(section);
            }
        });
    }

    // Навигация между разделами
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', async function() {

            // Удаляем активный класс у всех элементов
            document.querySelectorAll('.nav-item').forEach(navItem => {
                navItem.classList.remove('active');
            });

            // Добавляем активный класс текущему элементу
            this.classList.add('active');

            // Получаем выбранный раздел
            const section = this.dataset.section;

            try {
                let data;
                switch(section) {
                    case 'games':
                        data = await window.electronAPI.getGamesWithTags();
                        break;
                    case 'movies':
                        data = await window.electronAPI.getMoviesWithTags();
                        break;
                    case 'serials':
                        data = await window.electronAPI.getSerialsWithTags();
                        break;
                    case 'anime':
                        data = await window.electronAPI.getAnimeWithTags();
                        break;
                    case 'books':
                        data = await window.electronAPI.getBooksWithTags();
                        break;
                }
                await renderSection(section, data, true, false);
            } catch (error) {
                console.error(`Ошибка загрузки раздела ${section}:`, error);
                await showError(`Не удалось загрузить раздел ${section}`);
            }
        });
    });

    async function addNewData(section) {
        if (isAddingGame) return;
        isAddingGame = true;
        const nameInput = document.getElementById('nameInput');
        const icoInput = document.getElementById('icoInput');
        const ratingSelect = document.getElementById('ratingSelect');
        const statusSelect = document.getElementById('statusSelect');

        const cardData = {
            name: nameInput.value.trim(),
            icoUrl: icoInput.value.trim(),
            rating: ratingSelect.value,
            status: statusSelect.value
        };

        if (!cardData.name) {
            await showError('Пожалуйста, введите название');
            nameInput.focus();
            isAddingGame = false;
            return;
        }

        try {
            switch (section) {
                case "games":
                    await window.electronAPI.addGame(cardData);
                    break;
                case "movies":
                    await window.electronAPI.addMovie(cardData);
                    break;
                case "serials":
                    await window.electronAPI.addSerial(cardData);
                    break;
                case "anime":
                    await window.electronAPI.addAnime(cardData);
                    break;
                case "books":
                    await window.electronAPI.addBook(cardData);
                    break;
            }
            resetForm();

            // Перезагружаем данные и рендерим раздел заново
            let data;
            switch (section) {
                case "games":
                    data = await window.electronAPI.getGamesWithTags();
                    break;
                case "movies":
                    data = await window.electronAPI.getMoviesWithTags();
                    break;
                case "serials":
                    data = await window.electronAPI.getSerialsWithTags();
                    break;
                case "anime":
                    data = await window.electronAPI.getAnimeWithTags();
                    break;
                case "books":
                    data = await window.electronAPI.getBooksWithTags();
                    break;
            }
            await renderSection(section, data, true);
        } catch (error) {
            console.error('Ошибка при добавлении:', error);
            await showError(`Ошибка при добавлении: ${error.message}`);
        } finally {
            isAddingGame = false;
        }
    }

    function setupEditableFields() {
        const oldFields = document.querySelectorAll('.editable-field');
        oldFields.forEach(field => {
            field.replaceWith(field.cloneNode(true)); // Это удалит все привязанные обработчики
        });

        document.querySelectorAll('.editable-field').forEach(field => {
            // Меняем курсор при наведении
            field.style.cursor = 'pointer';

            // Обработчик клика
            field.addEventListener('click', async function(e) {
                e.stopPropagation();
                const itemName = this.dataset.name;
                const isRating = this.classList.contains('rating-value');
                const currentValue = isRating ? this.dataset.rating : this.dataset.status;

                // Получаем возможные значения
                let values, title;
                if (isRating) {
                    values = await window.electronAPI.getRatings();
                    title = 'Выберите рейтинг';
                } else {
                    values = await window.electronAPI.getStatuses();
                    title = 'Выберите статус';
                }

                // Создаем модальное окно с селектором
                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.style.display = 'block';
                modal.innerHTML = `
                <div class="modal-content" style="max-width: 300px;">
                    <h3>${title}</h3>
                    <select class="edit-select">
                        ${values.map(v => `<option value="${v}" ${v === currentValue ? 'selected' : ''}>${v}</option>`).join('')}
                    </select>
                    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <button class="modal-button cancel-btn">Отмена</button>
                        <button class="modal-button confirm-btn">Сохранить</button>
                    </div>
                </div>
            `;

                document.body.appendChild(modal);

                // Обработчики для кнопок
                modal.querySelector('.cancel-btn').addEventListener('click', () => {
                    document.body.removeChild(modal);
                });

                modal.querySelector('.confirm-btn').addEventListener('click', async () => {
                    const newValue = modal.querySelector('.edit-select').value;
                    try {
                        const section = document.querySelector('.nav-item.active')?.dataset.section;
                        let data;

                        if (isRating) {
                            if (section === 'games') {
                                await window.electronAPI.updateGameRating(itemName, newValue);
                                data = await window.electronAPI.getGamesWithTags();
                            } else if (section === 'movies') {
                                await window.electronAPI.updateMovieRating(itemName, newValue);
                                data = await window.electronAPI.getMoviesWithTags();
                            } else if (section === 'serials') {
                                await window.electronAPI.updateSerialRating(itemName, newValue);
                                data = await window.electronAPI.getSerialsWithTags();
                            } else if (section === 'anime') {
                                await window.electronAPI.updateAnimeRating(itemName, newValue);
                                data = await window.electronAPI.getAnimeWithTags();
                            } else if (section === 'books') {
                                await window.electronAPI.updateBookRating(itemName, newValue);
                                data = await window.electronAPI.getBooksWithTags();
                            }
                            this.dataset.rating = newValue;
                            this.textContent = newValue || 'Не оценено';
                        } else {
                            if (section === 'games') {
                                await window.electronAPI.updateGameStatus(itemName, newValue);
                                data = await window.electronAPI.getGamesWithTags();
                            } else if (section === 'movies') {
                                await window.electronAPI.updateMovieStatus(itemName, newValue);
                                data = await window.electronAPI.getMoviesWithTags();
                            } else if (section === 'serials') {
                                await window.electronAPI.updateSerialStatus(itemName, newValue);
                                data = await window.electronAPI.getSerialsWithTags();
                            } else if (section === 'anime') {
                                await window.electronAPI.updateAnimeStatus(itemName, newValue);
                                data = await window.electronAPI.getAnimeWithTags();
                            } else if (section === 'books') {
                                await window.electronAPI.updateBookStatus(itemName, newValue);
                                data = await window.electronAPI.getBooksWithTags();
                            }
                            this.dataset.status = newValue;
                            this.textContent = newValue || 'Не играл';
                        }

                        // Перерисовываем раздел с обновленными данными
                        await renderSection(section, data, true, true);

                        document.body.removeChild(modal);
                    } catch (error) {
                        console.error('Ошибка при обновлении:', error);
                        showError('Не удалось обновить значение');
                    }
                });

                // Закрытие при клике вне модального окна
                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
            });
        });
    }

    function setupDeleteButtons() {
        const oldButtons = document.querySelectorAll('.delete-btn');
        oldButtons.forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const itemName = btn.dataset.name;

                // Создаем модальное окно подтверждения
                const confirmModal = document.createElement('div');
                confirmModal.className = 'modal';
                confirmModal.style.display = 'block';
                confirmModal.innerHTML = `
                <div class="modal-content" style="max-width: 300px;">
                    <h3>Подтверждение удаления</h3>
                    <p>Вы уверены, что хотите удалить "${itemName}"?</p>
                    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <button class="modal-button cancel-btn delete-bt">Отмена</button>
                        <button class="modal-button confirm-btn delete-bt" style="background-color: #e74c3c;">Удалить</button>
                    </div>
                </div>
            `;

                document.body.appendChild(confirmModal);

                // Обработчики для кнопок
                confirmModal.querySelector('.cancel-btn').addEventListener('click', () => {
                    document.body.removeChild(confirmModal);
                });

                confirmModal.querySelector('.confirm-btn').addEventListener('click', async () => {
                    try {
                        const section = document.querySelector('.nav-item.active')?.dataset.section;
                        if (section === 'games') {
                            await window.electronAPI.deleteGame(itemName);
                        } else if (section === 'movies') {
                            await window.electronAPI.deleteMovie(itemName);
                        } else if (section === 'serials') {
                            await window.electronAPI.deleteSerial(itemName);
                        } else if (section === 'anime') {
                            await window.electronAPI.deleteAnime(itemName);
                        } else if (section === 'books') {
                            await window.electronAPI.deleteBook(itemName);
                        }
                        btn.closest('.data-card').remove();
                        document.body.removeChild(confirmModal);
                    } catch (error) {
                        console.error('Не удалось удалить:', error);
                        await showError('Не удалось удалить');
                        document.body.removeChild(confirmModal);
                    }
                });

                // Закрытие при клике вне модального окна
                confirmModal.addEventListener('click', (e) => {
                    if (e.target === confirmModal) {
                        document.body.removeChild(confirmModal);
                    }
                });
            });
        });
    }

    function setupSearchButtons() {
        const oldButtons = document.querySelectorAll('.search-btn');
        oldButtons.forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.search-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const itemName = btn.dataset.name;
                if (itemName) {
                    const searchUrl = `https://yandex.ru/images/search?text=${encodeURIComponent(itemName)}`;
                    window.electronAPI.openExternal(searchUrl);
                }
            });
        });
    }

    function setupIconSearchButton() {
        const oldButtons = document.querySelectorAll('.search-icon-btn');
        oldButtons.forEach(btn => {
            btn.replaceWith(btn.cloneNode(true));
        });

        document.querySelectorAll('.search-icon-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const nameInput = document.getElementById('nameInput');
                if (nameInput && nameInput.value.trim()) {
                    const searchQuery = encodeURIComponent(nameInput.value.trim() + ' cover');
                    const searchUrl = `https://yandex.ru/images/search?text=${searchQuery}`;
                    window.electronAPI.openExternal(searchUrl);
                } else {
                    showError('Введите название перед поиском иконки');
                }
            });
        });
    }

    function setupTitleClickHandlers() {
        document.querySelectorAll('.data-title').forEach(title => {
            // Удаляем старые обработчики
            title.replaceWith(title.cloneNode(true));
        });

        document.querySelectorAll('.data-title').forEach(title => {
            title.style.cursor = 'pointer';
            title.addEventListener('click', async function(e) {
                e.stopPropagation();
                const card = this.closest('.data-card');
                const oldName = card.dataset.name;
                const currentIcoUrl = card.querySelector('.game-icon').src;

                const modal = document.createElement('div');
                modal.className = 'modal';
                modal.style.display = 'block';
                modal.innerHTML = `
                <div class="modal-content" style="max-width: 400px;">
                    <h3>Редактировать карточку</h3>
                    <div class="form-group">
                        <label>Название</label>
                        <input id="editNameInput" value="${oldName}" class="edit-input">
                    </div>
                    <div class="form-group">
                        <label>URL иконки</label>
                        <div class="icon-input-container">
                            <input id="editIcoInput" value="${currentIcoUrl}" class="edit-input">
                            <button id="editSearchIconBtn" class="search-icon-btn" title="Найти иконку в интернете">🔍</button>
                        </div>
                    </div>
                    <div style="margin-top: 20px; display: flex; justify-content: space-between;">
                        <button class="modal-button cancel-btn">Отмена</button>
                        <button class="modal-button confirm-btn">Сохранить</button>
                    </div>
                </div>
            `;

                document.body.appendChild(modal);

                // Фокусируемся на поле ввода названия
                modal.querySelector('#editNameInput').focus();

                // Обработчик для кнопки поиска иконки
                modal.querySelector('#editSearchIconBtn').addEventListener('click', () => {
                    const nameInput = modal.querySelector('#editNameInput');
                    if (nameInput && nameInput.value.trim()) {
                        const searchQuery = encodeURIComponent(nameInput.value.trim() + ' cover');
                        const searchUrl = `https://yandex.ru/images/search?text=${searchQuery}`;
                        window.electronAPI.openExternal(searchUrl);
                    } else {
                        showError('Введите название перед поиском иконки');
                    }
                });

                modal.querySelector('.cancel-btn').addEventListener('click', () => {
                    document.body.removeChild(modal);
                });

                modal.querySelector('.confirm-btn').addEventListener('click', async () => {
                    const newName = modal.querySelector('#editNameInput').value.trim();
                    const newIcoUrl = modal.querySelector('#editIcoInput').value.trim();

                    if (!newName) {
                        await showError('Пожалуйста, введите название');
                        return;
                    }

                    try {
                        const section = document.querySelector('.nav-item.active')?.dataset.section;
                        let data;

                        switch(section) {
                            case 'games':
                                await window.electronAPI.updateGame(oldName, newName, newIcoUrl);
                                data = await window.electronAPI.getGamesWithTags();
                                break;
                            case 'movies':
                                await window.electronAPI.updateMovie(oldName, newName, newIcoUrl);
                                data = await window.electronAPI.getMoviesWithTags();
                                break;
                            case 'serials':
                                await window.electronAPI.updateSerial(oldName, newName, newIcoUrl);
                                data = await window.electronAPI.getSerialsWithTags();
                                break;
                            case 'anime':
                                await window.electronAPI.updateAnime(oldName, newName, newIcoUrl);
                                data = await window.electronAPI.getAnimeWithTags();
                                break;
                            case 'books':
                                await window.electronAPI.updateBook(oldName, newName, newIcoUrl);
                                data = await window.electronAPI.getBooksWithTags();
                                break;
                        }

                        await renderSection(section, data, true, true);
                        document.body.removeChild(modal);
                    } catch (error) {
                        console.error('Ошибка при обновлении:', error);
                        showError('Не удалось обновить карточку');
                    }
                });

                modal.addEventListener('click', (e) => {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
            });
        });
    }
</script>
