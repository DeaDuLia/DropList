<!DOCTYPE html>
<html lang="UTF-8">
<head>
    <meta charset="UTF-8">
    <title>Game Catalog</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            /* Основные цвета */
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --text-color: #2d3436;
            --light-bg: #f5f6fa;
            --card-bg: #ffffff;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.1);

            /* Цвета рейтингов */
            --rating-5: #2ecc71; /* Ярко-зелёный */
            --rating-4: #27ae60;
            --rating-3: #3498db; /* Голубой */
            --rating-2: #f1c40f; /* Жёлтый */
            --rating-1: #f39c12; /* Оранжевый */
            --rating-0: #95a5a6; /* Серый */
            --rating--1: #e74c3c; /* Красный */
            --rating--2: #c0392b;
            --rating--3: #992d22;
            --rating--4: #73241a;
            --rating--5: #4d1a12; /* Тёмно-красный */
            --rating-playing: #9b59b6; /* Фиолетовый */
            --rating-completed: #1abc9c; /* Бирюзовый */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.2rem;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .game-card {
            position: relative;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 16/9;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .game-icon {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .game-rating {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
            text-shadow: 0 1px 1px rgba(0,0,0,0.2);
        }

        /* Цвета для числовых рейтингов */
        .game-rating[data-rating="5"] { background-color: var(--rating-5); }
        .game-rating[data-rating="4"] { background-color: var(--rating-4); }
        .game-rating[data-rating="3"] { background-color: var(--rating-3); }
        .game-rating[data-rating="2"] { background-color: var(--rating-2); color: var(--text-color); text-shadow: none; }
        .game-rating[data-rating="1"] { background-color: var(--rating-1); }
        .game-rating[data-rating="0"] { background-color: var(--rating-0); }
        .game-rating[data-rating="-1"] { background-color: var(--rating--1); }
        .game-rating[data-rating="-2"] { background-color: var(--rating--2); }
        .game-rating[data-rating="-3"] { background-color: var(--rating--3); }
        .game-rating[data-rating="-4"] { background-color: var(--rating--4); }
        .game-rating[data-rating="-5"] { background-color: var(--rating--5); }

        .youtube-preview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
            border: none;
            pointer-events: none;
        }

        /* Специальные статусы */
        .game-rating[data-rating="Now playing"] {
            background-color: var(--rating-playing);
            animation: pulse 2s infinite;
        }
        .game-rating[data-rating="completed"] {
            background-color: var(--rating-completed);
            position: relative;
            padding-left: 25px;
        }
        .game-rating[data-rating="completed"]::before {
            content: "✓";
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
        }

        /* Анимация для "Now playing" */
        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .game-card:hover .youtube-preview {
            opacity: 1;
            pointer-events: auto;
        }

        .game-card:hover .game-icon {
            opacity: 0;
        }

        .game-info {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 20px;
            z-index: 3;
            color: white;
        }

        .game-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0 0 5px 0;
        }

        .game-rating {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .add-game-form {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-color);
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
            display: block;
            width: 100%;
        }

        button:hover {
            background-color: #5649d1;
        }

        @media (max-width: 768px) {
            .games-grid {
                grid-template-columns: 1fr;
            }

            .game-card {
                aspect-ratio: 16/9;
            }

            .add-game-form {
                padding: 15px;
            }
        }

        /* Для touch-устройств отключаем превью */
        @media (hover: none) {
            .youtube-preview {
                display: none !important;
            }

            .game-card:hover .game-icon {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Game Collection</h1>
    <div class="add-game-form">
        <div class="form-group">
            <label for="nameInput">Game Name</label>
            <input id="nameInput" placeholder="Enter game name">
        </div>

        <div class="form-group">
            <label for="icoInput">Icon URL</label>
            <input id="icoInput" placeholder="https://example.com/icon.jpg">
        </div>

        <div class="form-group">
            <label for="videoInput">Video URL</label>
            <input id="videoInput" placeholder="https://example.com/video.mp4">
        </div>

        <div class="form-group">
            <label for="ratingSelect">Rating</label>
            <select id="ratingSelect">
                <option value="">Select rating</option>
            </select>
        </div>

        <button id="addBtn">Add Game</button>
    </div>

    <div id="gamesList" class="games-grid"></div>

    <script>
        // Глобальные переменные
        let youtubePlayers = {};

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', async () => {
            await loadRatings();
            await loadGames();
            setupEventListeners();
        });

        // Загрузка рейтингов
        async function loadRatings() {
            try {
                const ratings = await window.electronAPI.getGameRatings();
                ratingSelect.innerHTML = `
      <option value="">Select rating</option>
      ${ratings.map(r => `<option value="${r}">${r}</option>`).join('')}
    `;
            } catch (error) {
                console.error('Error loading ratings:', error);
                alert('Failed to load ratings');
            }
        }

        // Загрузка списка игр
        async function loadGames() {
            try {
                const games = await window.electronAPI.getGamesWithTags();
                renderGames(games);
            } catch (error) {
                console.error('Error loading games:', error);
                alert('Failed to load games');
            }
        }

        // Отрисовка игр
        function renderGames(games) {
            gamesList.innerHTML = games.map(game => `
    <div class="game-card" data-game-name="${game.gameName}">
      ${getVideoPreviewHTML(game)}
      ${getGameIconHTML(game)}
      <div class="game-info">
        <h3 class="game-title">${game.gameName}</h3>
        <span class="game-rating" data-rating="${game.gameRating}">${game.gameRating || 'Not rated'}>${game.gameRating || 'Not rated'}</span>
      </div>
    </div>
  `).join('');

            initializeVideoPlayers();
        }

        // Генерация HTML для видео-превью
        function getVideoPreviewHTML(game) {
            if (!game.videoUrl) return '';
            const youtubeId = extractYouTubeId(game.videoUrl);
            if (!youtubeId) return '';

            return `
    <iframe class="youtube-preview"
      data-youtube-id="${youtubeId}"
      frameborder="0"
      allowfullscreen>
    </iframe>
  `;
        }

        // Генерация HTML для иконки игры
        function getGameIconHTML(game) {
            return `
    <img src="${game.icoUrl || 'https://via.placeholder.com/300x169?text=No+Image'}"
         alt="${game.gameName}"
         class="game-icon"
         onerror="this.src='https://via.placeholder.com/300x169?text=Image+Error'">
  `;
        }

        // Инициализация YouTube плееров
        function initializeVideoPlayers() {
            document.querySelectorAll('.youtube-preview').forEach(iframe => {
                const gameCard = iframe.closest('.game-card');
                const youtubeId = iframe.dataset.youtubeId;

                gameCard.addEventListener('mouseenter', () => {
                    iframe.src = `https://www.youtube.com/embed/${youtubeId}?autoplay=1&mute=1&controls=0&rel=0`;
                });

                gameCard.addEventListener('mouseleave', () => {
                    iframe.src = '';
                });
            });
        }

        // Добавление новой игры
        async function addNewGame() {
            const gameData = {
                name: nameInput.value.trim(),
                icoUrl: icoInput.value.trim(),
                videoUrl: videoInput.value.trim(),
                rating: ratingSelect.value
            };

            if (!gameData.name || !gameData.rating) {
                alert('Please enter game name and select rating');
                return;
            }

            try {
                await window.electronAPI.addGame(gameData);
                resetForm();
                await loadGames();
            } catch (error) {
                console.error('Error adding game:', error);
                alert('Failed to add game');
            }
        }

        // Сброс формы
        function resetForm() {
            nameInput.value = '';
            icoInput.value = '';
            videoInput.value = '';
            ratingSelect.value = '';
        }

        // Настройка обработчиков событий
        function setupEventListeners() {
            addBtn.addEventListener('click', addNewGame);
        }

        // Извлечение YouTube ID
        function extractYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
