<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DropList - Поиск обложки</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .loading-container {
            text-align: center;
            padding: 40px;
            max-width: 500px;
            width: 90%;
        }

        .loading-title {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: 600;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .loading-message {
            font-size: 16px;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.5;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .search-url {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
            word-break: break-all;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .tip {
            margin-top: 25px;
            font-size: 13px;
            opacity: 0.7;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="loading-container">
    <div class="loader"></div>
    <h1 class="loading-title">Ищем обложку...</h1>
    <p class="loading-message">
        Пожалуйста, подождите. Мы загружаем страницу с результатами поиска изображений.
    </p>
    <div class="search-url">
        Поиск: <span id="url-display">Загружаем...</span>
    </div>
    <p class="tip">
        💡 Кликните на любую картинку, чтобы скопировать её ссылку
    </p>
</div>
</body>
</html>
